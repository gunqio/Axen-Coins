name: Axen-US

on:
  workflow_dispatch:

jobs:
  run_axen_us:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong          # 修改此处
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 下载状态文件
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: state_repo
          persist-credentials: false

      - name: 📂 移动脚本到工作目录
        run: mv private/axen_coins.py axen_coins.py

      - name: 📂 拷贝 last_run.txt 到工作目录
        run: |
          if [ -f state_repo/last_run.txt ]; then
            cp state_repo/last_run.txt ./last_run.txt
          else
            echo "last_run.txt 不存在，创建空文件"
            touch ./last_run.txt
          fi
          echo "当前工作目录："
          pwd
          echo "last_run.txt 内容："
          cat ./last_run.txt || true

      - name: 🕒 初始化 last_run.txt
        shell: bash
        run: |
          if [ ! -f last_run.txt ]; then
            echo "last_run.txt 不存在，创建并写入当前时间"
            date -u +"%Y-%m-%dT%H:%M:%S" > last_run.txt
          elif [ ! -s last_run.txt ]; then
            echo "last_run.txt 为空，写入当前时间"
            date -u +"%Y-%m-%dT%H:%M:%S" > last_run.txt
          else
            echo "last_run.txt 已有内容，保持不变"
            cat last_run.txt
          fi
          echo "---- last_run.txt ----"
          cat last_run.txt

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🛡️ 启动 GOST 代理转发
        if: ${{ env.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.US_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3
          echo "✅ GOST 已启动，测试连通性..."
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org | sed 's/\([0-9]*\.[0-9]*\.\)[0-9]*\.[0-9]*/\1**.**/g'

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            google-chrome-stable \
            xvfb \
            x11-utils \
            xdotool \
            scrot

      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase
          seleniumbase install chromedriver

      - name: 🚀 运行脚本
        env:
          PYTHONIOENCODING: utf-8
          AXEN_ACCOUNT: ${{ secrets.US_ACCOUNT }}
          GOST_PROXY: ${{ secrets.US_PROXY }}
          TG_BOT: ${{ secrets.TG_BOT }}
          CRON_JOB: ${{ secrets.US_CRON }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python axen_coins.py

      - name: 📂 回写 last_run.txt
        run: |
          cp ./last_run.txt state_repo/last_run.txt
          cd state_repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add last_run.txt
          if git diff --cached --quiet; then
            echo "没有变化，不提交"
          else
            git commit -m "chore: update last_run.txt"
            git push https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/gunqio/zhiyong.git HEAD:main
          fi

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
