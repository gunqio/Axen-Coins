name: Axen-US
on:
  workflow_dispatch:
  
jobs:
  Renew-bot:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    
    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private
          
      - name: 📂 移动脚本到工作目录
        run: mv private/axen_coins.py axen_coins.py
        
      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: ⚙ 启动 GOST 代理（带健康检查）
        env:
          NODE_LINK: ${{ secrets.US_PROXY }}
        run: |
          if [ -z "$NODE_LINK" ]; then
            echo "ℹ️ US_PROXY 为空，跳过代理启动"
            touch /tmp/skip_gost
            exit 0
          fi

          sudo apt-get update -qq
          sudo apt-get install -y -qq wget curl

          VERSION="2.11.5"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost-linux-amd64-${VERSION}.gz"
          gunzip -f "gost-linux-amd64-${VERSION}.gz"
          chmod +x "gost-linux-amd64-${VERSION}"
          mv "gost-linux-amd64-${VERSION}" gost

          ./gost -L=:1080 -F "$NODE_LINK" > /tmp/gost.log 2>&1 &
          sleep 5

          # 关键：通过代理访问目标站，验证隧道是否可用
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 --proxy http://127.0.0.1:1080 https://app.axenthost.com/login || echo "000")
          echo "代理测试 HTTP 状态码: $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ] || [ "$HTTP_CODE" = "403" ]; then
            echo "http://127.0.0.1:1080" > /tmp/gost_proxy_url
            echo "✅ GOST 代理可用"
          else
            echo "⚠️ GOST 代理测试失败，HTTP_CODE=$HTTP_CODE"
            echo "--- GOST 日志 ---"
            cat /tmp/gost.log || true
            echo "--- 结束 ---"
            touch /tmp/skip_gost
            pkill gost || true
            echo "ℹ️ 将使用直连模式"
          fi
          
      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            google-chrome-stable \
            xvfb \
            x11-utils \
            xdotool \
            scrot
            
      - name: 🐍 安装 Python 依赖
        run: |
          unset http_proxy https_proxy ALL_PROXY HTTP_PROXY HTTPS_PROXY
          pip install seleniumbase
          seleniumbase install chromedriver
          
      - name: 🚀 运行脚本
        env:
          PYTHONIOENCODING: utf-8
          AXEN_ACCOUNT: ${{ secrets.US_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
          CRON_JOB: ${{ secrets.US_CRON }}
        run: |
          if [ -f /tmp/gost_proxy_url ] && [ ! -f /tmp/skip_gost ]; then
            export GOST_PROXY=$(cat /tmp/gost_proxy_url)
            echo "🌐 脚本使用代理: $GOST_PROXY"
          else
            echo "🌐 脚本直连模式（代理不可用或已跳过）"
          fi
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python axen_coins.py
          
      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          
      - name: 🧹 清理旧的工作流运行记录
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          unset http_proxy https_proxy ALL_PROXY HTTP_PROXY HTTPS_PROXY
          runs=$(gh run list --repo ${{ github.repository }} --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 1 ]; then
              echo "删除运行记录: $run_id"
              gh run delete $run_id --repo ${{ github.repository }} || true
            fi
          done
