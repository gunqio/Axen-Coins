name: Axen-US

on:
  workflow_dispatch:
  # 增加支持外部 API 触发通道
  repository_dispatch:
    types: [axen_auto_task]

jobs:
  run_axen_us:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本到工作目录
        run: mv private/axen_coins.py axen_coins.py

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🛡️ 启动 Xray 代理（自适应 VLESS/VMess）
        env:
          VLESS_CONFIG: ${{ secrets.VLESS_CONFIG }}
        # 修复关键点：在 if 中使用 env.VLESS_CONFIG，不要直接用 secrets
        if: ${{ env.VLESS_CONFIG != '' }}
        run: |
          echo "📦 下载 Xray-core..."
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q -o Xray-linux-64.zip
          chmod +x xray

          echo "📝 写入内核配置文件..."
          # 使用 printf 确保多行 JSON 字符串能原样写入，防止特殊字符或换行符被 echo 破坏
          printf "%s" "$VLESS_CONFIG" > config.json

          echo "🚀 启动 Xray 核心守护进程（监听 127.0.0.1:1080）..."
          # 重定向标准输入 </dev/null 并配合 disown，彻底防止 GitHub Actions 追踪进程导致挂起卡死
          nohup ./xray -c config.json > xray.log 2>&1 </dev/null &
          disown
          
          echo "⏳ 等待内核初始化..."
          sleep 5

          echo "🌐 测试代理连通性..."
          if curl -s --max-time 12 -x socks5h://127.0.0.1:1080 https://api.ipify.org > ip_res.txt; then
            echo "✅ 代理网路已打通！出口 IP 掩码处理为："
            cat ip_res.txt | sed 's/\([0-9]*\)\..*/\1.*.*.*/'
          else
            echo "❌ 代理连接失败或发生握手超时！"
            echo "📄 正在输出 xray.log 核心日志分析原因："
            cat xray.log
            exit 1
          fi

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            google-chrome-stable \
            xvfb \
            x11-utils \
            xdotool \
            scrot

      - name: 🐍 缓存 Python 依赖
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase
          seleniumbase install chromedriver

      - name: 🚀 运行脚本
        env:
          PYTHONIOENCODING: utf-8
          AXEN_ACCOUNT: ${{ secrets.US_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
          CRON_JOB: ${{ secrets.US_CRON }}
          # Xray socks5 代理（只有 Xray 启动成功后才有效）
          AXEN_SOCKS_PROXY: "socks5h://127.0.0.1:1080"
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python axen_coins.py

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-${{ github.run_number }}
          path: |
            *.png
            screens/*.png

      # === 任务结束后通知 Cloudflare Worker 定时 70 分钟 ===
      - name: 🔔 通知
        if: always()
        env:
          WORKER_URL: ${{ secrets.CF_WORKER_URL }}
          WORKER_AUTH_TOKEN: ${{ secrets.CF_WORKER_AUTH_TOKEN }}
        run: |
          RESPONSE=$(curl -s -w "%{http_code}" -o /tmp/cf_resp.txt \
            -X POST "$WORKER_URL" \
            -H "Authorization: Bearer $WORKER_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"status": "completed"}')

          HTTP_CODE=${RESPONSE: -3}
          echo "CF Worker 响应 HTTP: $HTTP_CODE"
          cat /tmp/cf_resp.txt
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "⚠️ Cloudflare Worker 通知失败，但 workflow 继续。"
          fi
