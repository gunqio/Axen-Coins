name: Axen-US
on:
  workflow_dispatch:

jobs:
  Renew-bot:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本到工作目录
        run: mv private/axen_coins.py axen_coins.py

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 1. 先装依赖（不走代理）
      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase
          seleniumbase install chromedriver

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable xvfb x11-utils xdotool scrot

      # 2. 启动 sing-box（脚本内部已验证代理可用）
      - name: ⚙ 设置代理 (sing-box)
        id: singbox
        env:
          NODE_LINK: ${{ secrets.US_PROXY }}
        run: |
          bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh)
          sleep 2

      # 3. 验证代理（用 SOCKS5，跟脚本一致）
      - name: 🌐 验证代理
        id: proxytest
        if: ${{ steps.singbox.outcome == 'success' }}
        run: |
          for i in 1 2 3; do
            IP=$(curl -x socks5://127.0.0.1:1080 -s --max-time 10 https://api.ip.sb/ip)
            [ -n "$IP" ] && echo "✅ 代理正常，出口 IP: $IP" && exit 0
            sleep 3
          done
          echo "❌ 代理测试失败"
          exit 1

      # 4. 代理失败 → 写回 Cron 1分钟后重试
      - name: ⚠️ 代理失败写回 Cron 1分钟后重试
        if: ${{ failure() && (steps.singbox.outcome == 'failure' || steps.proxytest.outcome == 'failure') }}
        env:
          CRON_JOB: ${{ secrets.US_CRON }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request, urllib.parse, datetime
          from datetime import timedelta

          cron_job = os.environ.get("CRON_JOB", "")
          if cron_job and "," in cron_job:
              api_key, job_id = [x.strip() for x in cron_job.split(",", 1)]
              next_run = datetime.datetime.utcnow() + timedelta(hours=8, minutes=1)
              data = {"job": {"schedule": {
                  "timezone": "Asia/Shanghai", "expiresAt": 0,
                  "hours": [next_run.hour], "minutes": [next_run.minute],
                  "mdays": [-1], "months": [-1], "wdays": [-1],
              }}}
              payload = json.dumps(data).encode()
              req = urllib.request.Request(
                  f"https://api.cron-job.org/jobs/{job_id}",
                  data=payload,
                  headers={"Authorization": f"Bearer {api_key}", "Content-Type": "application/json"},
                  method="PATCH"
              )
              try:
                  urllib.request.urlopen(req, timeout=15)
                  print(f"🔁 已写回 Cron：{next_run.hour:02d}:{next_run.minute:02d} 重试")
              except Exception as e:
                  print(f"⚠️ 写回 Cron 失败: {e}")

          tg_bot = os.environ.get("TG_BOT", "")
          if tg_bot and "," in tg_bot:
              chat_id, token = [x.strip() for x in tg_bot.split(",", 1)]
              msg = "⚠️ Axen US 代理启动失败，已安排1分钟后重试"
              try:
                  urllib.request.urlopen(
                      f"https://api.telegram.org/bot{token}/sendMessage",
                      data=urllib.parse.urlencode({"chat_id": chat_id, "text": msg}).encode(),
                      timeout=10
                  )
                  print("📨 TG 推送成功")
              except Exception as e:
                  print(f"⚠️ TG 推送失败: {e}")
          EOF

      # 5. 运行脚本（SOCKS5 代理）
      - name: 🚀 运行脚本
        if: ${{ steps.proxytest.outcome == 'success' }}
        env:
          PYTHONIOENCODING: utf-8
          AXEN_ACCOUNT: ${{ secrets.US_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
          CRON_JOB: ${{ secrets.US_CRON }}
          HTTP_PROXY: socks5://127.0.0.1:1080
          HTTPS_PROXY: socks5://127.0.0.1:1080
          NO_PROXY: localhost,127.0.0.1
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python axen_coins.py

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"

      - name: 🧹 清理旧的工作流运行记录
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --repo ${{ github.repository }} --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 1 ]; then
              echo "删除运行记录: $run_id"
              gh run delete $run_id --repo ${{ github.repository }} || true
            fi
          done
