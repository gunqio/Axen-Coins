name: Axen-US

on:
  workflow_dispatch:
  # 增加支持外部 API 触发通道
  repository_dispatch:
    types: [axen_auto_task]

jobs:
  run_axen_us:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong          # 修改此处
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本到工作目录
        run: mv private/axen_coins.py axen_coins.py

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # ========== 新增：Xray 代理（支持 vless/vmess/ss）==========
      - name: 🔄 配置 Xray 代理（vless/vmess/ss）
        if: ${{ secrets.PROXY_CONFIG_BASE64 != '' }}
        env:
          PROXY_CONFIG_BASE64: ${{ secrets.PROXY_CONFIG_BASE64 }}
        run: |
          # 1. 下载最新 Xray-core
          echo "📦 下载 Xray-core..."
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip
          chmod +x xray

          # 2. 解码配置文件（需要您事先将 config.json 进行 Base64 编码后存入 secret）
          echo "$PROXY_CONFIG_BASE64" | base64 -d > config.json
          echo "✅ 配置文件已生成"

          # 3. 启动 Xray（后台运行）
          nohup ./xray -c config.json > xray.log 2>&1 &
          sleep 3

          # 4. 导出系统代理环境变量（假设您配置的 inbound 端口为：http=10809, socks=1080）
          echo "HTTP_PROXY=http://127.0.0.1:10809" >> $GITHUB_ENV
          echo "HTTPS_PROXY=http://127.0.0.1:10809" >> $GITHUB_ENV
          echo "ALL_PROXY=socks5://127.0.0.1:1080" >> $GITHUB_ENV
          echo "NO_PROXY=localhost,127.0.0.1" >> $GITHUB_ENV

          # 5. 测试连通性（IP 已脱敏）
          curl -s -x http://127.0.0.1:10809 https://api.ipify.org | sed 's/\([0-9]*\.[0-9]*\.\)[0-9]*\.[0-9]*/\1**.**/g'
          echo "✅ Xray 代理已就绪"
        # ======================================================

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            google-chrome-stable \
            xvfb \
            x11-utils \
            xdotool \
            scrot

      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase
          seleniumbase install chromedriver

      - name: 🚀 运行脚本
        env:
          PYTHONIOENCODING: utf-8
          AXEN_ACCOUNT: ${{ secrets.US_ACCOUNT }}
          # 原 GOST_PROXY 已移除，不再需要
          TG_BOT: ${{ secrets.TG_BOT }}
          CRON_JOB: ${{ secrets.US_CRON }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python axen_coins.py

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"

      # === 通知 Cloudflare Worker（保持不变）===
      - name: 🔔 通知 
        if: always()
        env:
          WORKER_URL: ${{ secrets.CF_WORKER_URL }}
          WORKER_AUTH_TOKEN: ${{ secrets.CF_WORKER_AUTH_TOKEN }}
        run: |
          curl -X POST "$WORKER_URL" \
            -H "Authorization: Bearer $WORKER_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"status": "completed"}'
