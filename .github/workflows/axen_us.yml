name: Axen-US

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  Renew-bot:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    
    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private
          
      - name: 📂 移动脚本到工作目录
        run: mv private/axen_coins.py axen_coins.py
        
      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: ⚙ 设置 GOST 代理转发
        env:
          NODE_LINK: ${{ secrets.US_PROXY }}
        run: |
          if [ -z "$NODE_LINK" ]; then
            echo "US_PROXY 为空，跳过代理"
            echo "GOST_PROXY=" >> $GITHUB_ENV
            exit 0
          fi

          sudo apt-get update -qq
          sudo apt-get install -y -qq wget

          VERSION="2.11.5"
          wget -q --timeout=30 "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost-linux-amd64-${VERSION}.gz"
          gunzip -f "gost-linux-amd64-${VERSION}.gz"
          chmod +x "gost-linux-amd64-${VERSION}"
          mv "gost-linux-amd64-${VERSION}" gost

          ./gost -L=:1080 -F "$NODE_LINK" > /tmp/gost.log 2>&1 &
          sleep 3

          echo "GOST_PROXY=http://127.0.0.1:1080" >> $GITHUB_ENV
          echo "ALL_PROXY=http://127.0.0.1:1080" >> $GITHUB_ENV
          echo "http_proxy=http://127.0.0.1:1080" >> $GITHUB_ENV
          echo "https_proxy=http://127.0.0.1:1080" >> $GITHUB_ENV
          echo "no_proxy=localhost,127.0.0.1" >> $GITHUB_ENV

          echo "✅ GOST 代理已启动: http://127.0.0.1:1080"
          
      - name: 🛠️ 安装 Chrome 和系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            xvfb \
            wget \
            unzip \
            libnss3 \
            libfontconfig1 \
            libgbm1 \
            libxss1 \
            libgtk-3-0

          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i google-chrome-stable_current_amd64.deb || sudo apt-get install -f -y -qq
          
          google-chrome --version
          
      - name: 🐍 安装 Python 依赖
        run: |
          pip install --no-cache-dir seleniumbase requests
          
      - name: 🔧 安装 ChromeDriver（带重试）
        timeout-minutes: 5
        run: |
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+' | head -1)
          echo "Chrome 主版本: $CHROME_VERSION"
          
          for i in 1 2 3; do
            echo "尝试 $i/3: seleniumbase install chromedriver"
            if seleniumbase install chromedriver; then
              echo "✅ ChromeDriver 安装成功"
              chromedriver --version
              exit 0
            fi
            echo "失败，等待 10 秒重试..."
            sleep 10
          done
          
          echo "使用备用方案手动下载..."
          DRIVER_VERSION=$(curl -s --max-time 10 "https://googlechromelabs.github.io/chrome-for-testing/LATEST_RELEASE_${CHROME_VERSION}" || echo "150.0.7871.115")
          
          wget -q --timeout=60 "https://storage.googleapis.com/chrome-for-testing-public/${DRIVER_VERSION}/linux64/chromedriver-linux64.zip" -O chromedriver.zip || \
          wget -q --timeout=60 "https://registry.npmmirror.com/-/binary/chromedriver/${DRIVER_VERSION}/chromedriver_linux64.zip" -O chromedriver.zip
          
          unzip -q chromedriver.zip
          sudo mv chromedriver-linux64/chromedriver /usr/local/bin/chromedriver || sudo mv chromedriver /usr/local/bin/chromedriver
          sudo chmod +x /usr/local/bin/chromedriver
          chromedriver --version
          
      - name: 🚀 运行脚本
        env:
          PYTHONIOENCODING: utf-8
          AXEN_ACCOUNT: ${{ secrets.US_ACCOUNT }}
          GOST_PROXY: http://127.0.0.1:1080
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          which chromedriver
          chromedriver --version
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python axen_coins.py
          
      - name: 📸 上传截图和 HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files
          path: |
            *.png
            *.html
          retention-days: 3
          
      - name: 🧹 清理旧的工作流运行记录
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --repo ${{ github.repository }} --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 3 ]; then
              echo "删除运行记录: $run_id"
              gh run delete $run_id --repo ${{ github.repository }} || true
            fi
          done
