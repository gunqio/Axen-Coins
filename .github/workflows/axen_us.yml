name: Axen-US
on:
  workflow_dispatch:
  
jobs:
  Renew-bot:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    
    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private
          
      - name: 📂 移动脚本到工作目录
        run: mv private/axen_coins.py axen_coins.py
        
      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: ⚙ 启动 Xray-core 代理（带健康检查）
        env:
          XRAY_CONFIG: ${{ secrets.XRAY_CONFIG }}
        run: |
          if [ -z "$XRAY_CONFIG" ]; then
            echo "ℹ️ XRAY_CONFIG 为空，跳过代理启动"
            touch /tmp/skip_xray
            exit 0
          fi

          sudo apt-get update -qq
          sudo apt-get install -y -qq wget curl

          # 下载 Xray-core 最新版
          VERSION="24.11.30"
          wget -q "https://github.com/XTLS/Xray-core/releases/download/v${VERSION}/Xray-linux-64.zip"
          unzip -q -o "Xray-linux-64.zip" -d xray_dir
          chmod +x xray_dir/xray

          # 写入配置文件
          echo "$XRAY_CONFIG" > /tmp/xray_config.json

          # 启动 Xray
          ./xray_dir/xray -c /tmp/xray_config.json > /tmp/xray.log 2>&1 &
          sleep 5

          # 验证端口是否监听（默认 socks5 1080 或 http 1081，根据配置调整）
          if ss -tlnp 2>/dev/null | grep -q ':1080'; then
            echo "✅ Xray 代理已启动: socks5://127.0.0.1:1080"
            echo "socks5://127.0.0.1:1080" > /tmp/xray_proxy_url
          elif ss -tlnp 2>/dev/null | grep -q ':1081'; then
            echo "✅ Xray 代理已启动: http://127.0.0.1:1081"
            echo "http://127.0.0.1:1081" > /tmp/xray_proxy_url
          else
            echo "⚠️ Xray 端口未监听，可能启动失败"
            echo "--- Xray 日志 ---"
            cat /tmp/xray.log || true
            echo "--- 结束 ---"
            touch /tmp/skip_xray
            pkill xray || true
            echo "ℹ️ 将使用直连模式"
            exit 0
          fi

          # 健康检查：通过代理访问目标站
          # 注意：Xray 默认是 socks5，curl 需要 --socks5 或配置 http inbound
          PROXY_URL=$(cat /tmp/xray_proxy_url)
          if [[ "$PROXY_URL" == socks5* ]]; then
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 --socks5-hostname 127.0.0.1:1080 https://app.axenthost.com/login || echo "000")
          else
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 --proxy "$PROXY_URL" https://app.axenthost.com/login || echo "000")
          fi
          echo "代理测试 HTTP 状态码: $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ] || [ "$HTTP_CODE" = "403" ]; then
            echo "✅ Xray 代理可用"
          else
            echo "⚠️ Xray 代理测试失败，HTTP_CODE=$HTTP_CODE"
            echo "--- Xray 日志 ---"
            cat /tmp/xray.log || true
            echo "--- 结束 ---"
            touch /tmp/skip_xray
            pkill xray || true
            echo "ℹ️ 将使用直连模式"
          fi
          
      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            google-chrome-stable \
            xvfb \
            x11-utils \
            xdotool \
            scrot
            
      - name: 🐍 安装 Python 依赖
        run: |
          unset http_proxy https_proxy ALL_PROXY HTTP_PROXY HTTPS_PROXY
          pip install seleniumbase
          seleniumbase install chromedriver
          
      - name: 🚀 运行脚本
        env:
          PYTHONIOENCODING: utf-8
          AXEN_ACCOUNT: ${{ secrets.US_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
          CRON_JOB: ${{ secrets.US_CRON }}
        run: |
          if [ -f /tmp/xray_proxy_url ] && [ ! -f /tmp/skip_xray ]; then
            export GOST_PROXY=$(cat /tmp/xray_proxy_url)
            echo "🌐 脚本使用代理: $GOST_PROXY"
          else
            echo "🌐 脚本直连模式（代理不可用或已跳过）"
          fi
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python axen_coins.py
          
      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          
      - name: 🧹 清理旧的工作流运行记录
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          unset http_proxy https_proxy ALL_PROXY HTTP_PROXY HTTPS_PROXY
          runs=$(gh run list --repo ${{ github.repository }} --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 1 ]; then
              echo "删除运行记录: $run_id"
              gh run delete $run_id --repo ${{ github.repository }} || true
            fi
          done
