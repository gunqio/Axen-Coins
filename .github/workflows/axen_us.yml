name: Axen-US

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  Renew-bot:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本到工作目录
        run: mv private/axen_coins.py axen_coins.py

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ---------- 代理启动步骤（增强验证）----------
      - name: ⚙ 设置 GOST 代理转发
        env:
          NODE_LINK: ${{ secrets.US_PROXY }}
        run: |
          if [ -z "$NODE_LINK" ]; then
            echo "US_PROXY 为空，跳过代理"
            echo "GOST_PROXY=" >> $GITHUB_ENV
            exit 0
          fi

          sudo apt-get update -qq
          sudo apt-get install -y -qq wget curl

          VERSION="2.11.5"
          # 下载 GOST，增加超时和重试，并尝试国内镜像
          wget -q --timeout=60 --tries=3 "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost-linux-amd64-${VERSION}.gz" -O gost.gz || \
          wget -q --timeout=60 --tries=3 "https://registry.npmmirror.com/-/binary/gost/${VERSION}/gost-linux-amd64-${VERSION}.gz" -O gost.gz
          gunzip -f gost.gz
          chmod +x "gost-linux-amd64-${VERSION}"
          mv "gost-linux-amd64-${VERSION}" gost

          # 后台启动 GOST
          ./gost -L=:1080 -F "$NODE_LINK" > /tmp/gost.log 2>&1 &
          sleep 5

          # 验证代理是否可用
          if curl -s -x http://127.0.0.1:1080 -I https://google.com --max-time 10; then
            echo "✅ GOST 代理验证成功"
            echo "GOST_PROXY=http://127.0.0.1:1080" >> $GITHUB_ENV
            echo "ALL_PROXY=http://127.0.0.1:1080" >> $GITHUB_ENV
            echo "http_proxy=http://127.0.0.1:1080" >> $GITHUB_ENV
            echo "https_proxy=http://127.0.0.1:1080" >> $GITHUB_ENV
            echo "no_proxy=localhost,127.0.0.1" >> $GITHUB_ENV
          else
            echo "⚠️ 代理不可用，后续步骤将不使用代理（清除代理环境变量）"
            pkill -f gost || true
            # 不设置任何代理环境变量，确保后续不走代理
          fi

      # ---------- 安装 Chrome（方案一：临时清除代理）----------
      - name: 🛠️ 安装 Chrome
        uses: browser-actions/setup-chrome@latest
        env:
          # 🔧 关键：覆盖所有代理变量为空，使该步骤直连网络
          http_proxy: ""
          https_proxy: ""
          ALL_PROXY: ""
          no_proxy: ""
        with:
          chrome-version: stable
          install-dependencies: false
          install-chromedriver: false
          no-sudo: false

      # ---------- 安装系统依赖 ----------
      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb libnss3 libfontconfig1 libgbm1
          google-chrome --version

      # ---------- 安装 Python 依赖 ----------
      - name: 🐍 安装 Python 依赖
        run: |
          pip install --no-cache-dir seleniumbase requests

      # ---------- 安装 ChromeDriver ----------
      - name: 🔧 安装 ChromeDriver
        run: |
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+\.\d+' || echo "150.0.7871.115")
          echo "Chrome 版本: $CHROME_VERSION"
          seleniumbase install chromedriver ${CHROME_VERSION}
          chromedriver --version
        # 如果代理可用，此步骤会走代理；若代理不可用，则直连（因为已设置代理环境变量或未设置）

      # ---------- 运行主脚本 ----------
      - name: 🚀 运行脚本
        env:
          PYTHONIOENCODING: utf-8
          AXEN_ACCOUNT: ${{ secrets.US_ACCOUNT }}
          GOST_PROXY: ${{ env.GOST_PROXY }}   # 如果代理可用，此处有值，否则为空
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          which chromedriver
          chromedriver --version
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python axen_coins.py

      # ---------- 上传调试文件 ----------
      - name: 📸 上传截图和 HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files
          path: |
            *.png
            *.html
          retention-days: 3

      # ---------- 清理旧的工作流运行记录 ----------
      - name: 🧹 清理旧的工作流运行记录
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --repo ${{ github.repository }} --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 3 ]; then
              echo "删除运行记录: $run_id"
              gh run delete $run_id --repo ${{ github.repository }} || true
            fi
          done
