name: Axen-US

on:
  workflow_dispatch:
  repository_dispatch:
    types: [axen_auto_task]

jobs:
  run_axen_us:
    runs-on: ubuntu-latest
    # ✅ 在作业级别定义环境变量，方便 if 条件引用
    env:
      GOST_PROXY: ${{ secrets.US_PROXY }}

    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本到工作目录
        run: mv private/axen_coins.py axen_coins.py

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # ✅ 修正：if 条件改为判断作业级 env.GOST_PROXY 是否非空
      - name: 🛡️ 启动 GOST 代理转发
        if: env.GOST_PROXY != ''
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3
          # ✅ 检查进程是否启动成功
          if pgrep -x "gost" > /dev/null; then
            echo "✅ GOST 进程运行中"
          else
            echo "❌ GOST 启动失败，日志如下："
            cat gost.log
            exit 1
          fi
          # 测试代理连通性
          echo "测试代理连通性..."
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org || echo "⚠️ 代理连通失败"

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            google-chrome-stable \
            xvfb \
            x11-utils \
            xdotool \
            scrot

      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase
          seleniumbase install chromedriver

      - name: 🚀 运行脚本
        env:
          PYTHONIOENCODING: utf-8
          AXEN_ACCOUNT: ${{ secrets.US_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
          CRON_JOB: ${{ secrets.US_CRON }}
          # ✅ 传递 GOST 代理地址给 Python 脚本（本地转发）
          GOST_PROXY: http://127.0.0.1:8080
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python axen_coins.py

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"

      - name: 🔔 通知
        if: always()
        env:
          WORKER_URL: ${{ secrets.CF_WORKER_URL }}
          WORKER_AUTH_TOKEN: ${{ secrets.CF_WORKER_AUTH_TOKEN }}
        run: |
          curl -X POST "$WORKER_URL" \
            -H "Authorization: Bearer $WORKER_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"status": "completed"}'
