name: Axen-US

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  Renew-bot:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本到工作目录
        run: mv private/axen_coins.py axen_coins.py

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ============================================
      # 1. GOST 代理启动（失败自动跳过）
      # ============================================
      - name: ⚙ 设置 GOST 代理转发
        env:
          NODE_LINK: ${{ secrets.US_PROXY }}
        run: |
          set +e
          if [ -z "$NODE_LINK" ]; then
            echo "US_PROXY 为空，跳过代理"
            echo "GOST_PROXY=" >> $GITHUB_ENV
            exit 0
          fi

          sudo apt-get update -qq
          sudo apt-get install -y -qq wget curl

          VERSION="2.11.5"
          wget -q --timeout=60 --tries=3 "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost-linux-amd64-${VERSION}.gz" -O gost.gz || \
          wget -q --timeout=60 --tries=3 "https://registry.npmmirror.com/-/binary/gost/${VERSION}/gost-linux-amd64-${VERSION}.gz" -O gost.gz

          if [ ! -s gost.gz ]; then
            echo "⚠️ GOST 下载失败，跳过代理配置"
            echo "GOST_PROXY=" >> $GITHUB_ENV
            exit 0
          fi

          gunzip -f gost.gz
          if [ $? -ne 0 ]; then
            echo "⚠️ GOST 解压失败，跳过代理配置"
            echo "GOST_PROXY=" >> $GITHUB_ENV
            exit 0
          fi

          EXTRACTED=$(ls -1 gost-linux-amd64-* 2>/dev/null | head -n1)
          if [ -z "$EXTRACTED" ]; then
            if [ -f "gost" ]; then
              EXTRACTED="gost"
            else
              echo "⚠️ 找不到解压后的可执行文件，跳过代理配置"
              echo "GOST_PROXY=" >> $GITHUB_ENV
              exit 0
            fi
          fi

          chmod +x "$EXTRACTED"
          mv "$EXTRACTED" gost

          ./gost -L=:1080 -F "$NODE_LINK" > /tmp/gost.log 2>&1 &
          sleep 5

          if curl -s -x http://127.0.0.1:1080 -I https://google.com --max-time 10; then
            echo "✅ GOST 代理验证成功"
            echo "GOST_PROXY=http://127.0.0.1:1080" >> $GITHUB_ENV
            echo "ALL_PROXY=http://127.0.0.1:1080" >> $GITHUB_ENV
            echo "http_proxy=http://127.0.0.1:1080" >> $GITHUB_ENV
            echo "https_proxy=http://127.0.0.1:1080" >> $GITHUB_ENV
            echo "no_proxy=localhost,127.0.0.1" >> $GITHUB_ENV
          else
            echo "⚠️ 代理验证失败，跳过代理设置（后续步骤直连）"
            pkill -f gost || true
            echo "GOST_PROXY=" >> $GITHUB_ENV
          fi
          set -e

      # ============================================
      # 2. 安装 Chrome（清除代理，直连）
      # ============================================
      - name: 🛠️ 安装 Chrome
        uses: browser-actions/setup-chrome@latest
        env:
          http_proxy: ""
          https_proxy: ""
          ALL_PROXY: ""
          no_proxy: ""
        with:
          chrome-version: stable
          install-dependencies: false
          install-chromedriver: false
          no-sudo: false

      # ============================================
      # 3. 系统依赖
      # ============================================
      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb libnss3 libfontconfig1 libgbm1
          google-chrome --version

      # ============================================
      # 4. 安装 Python 依赖（清除代理，直连）
      # ============================================
      - name: 🐍 安装 Python 依赖
        env:
          http_proxy: ""
          https_proxy: ""
          ALL_PROXY: ""
          no_proxy: ""
        run: |
          pip install --no-cache-dir seleniumbase requests

      # ============================================
      # 5. 安装 ChromeDriver（清除代理，直连）
      # ============================================
      - name: 🔧 安装 ChromeDriver
        env:
          http_proxy: ""
          https_proxy: ""
          ALL_PROXY: ""
          no_proxy: ""
        run: |
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+\.\d+' || echo "150.0.7871.115")
          echo "Chrome 版本: $CHROME_VERSION"
          seleniumbase install chromedriver ${CHROME_VERSION}
          chromedriver --version

      # ============================================
      # 6. 运行主脚本（保留代理环境变量）
      # ============================================
      - name: 🚀 运行脚本
        env:
          PYTHONIOENCODING: utf-8
          AXEN_ACCOUNT: ${{ secrets.US_ACCOUNT }}
          GOST_PROXY: ${{ env.GOST_PROXY }}   # 若代理生效则传递，否则为空
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          which chromedriver
          chromedriver --version
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python axen_coins.py

      # ============================================
      # 7. 上传调试文件
      # ============================================
      - name: 📸 上传截图和 HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files
          path: |
            *.png
            *.html
          retention-days: 3

      # ============================================
      # 8. 清理旧运行记录
      # ============================================
      - name: 🧹 清理旧的工作流运行记录
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --repo ${{ github.repository }} --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 3 ]; then
              echo "删除运行记录: $run_id"
              gh run delete $run_id --repo ${{ github.repository }} || true
            fi
          done
