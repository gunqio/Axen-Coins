name: Axen-US
on:
  workflow_dispatch:
  
jobs:
  Renew-bot:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    
    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private
          
      - name: 📂 移动脚本到工作目录
        run: mv private/axen_coins.py axen_coins.py
        
      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: ⚙ 设置 GOST 代理转发
        env:
          NODE_LINK: ${{ secrets.US_PROXY }}
        run: |
          if [ -z "$NODE_LINK" ]; then
            echo "US_PROXY 为空，跳过代理"
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y wget

          VERSION="2.11.5"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost-linux-amd64-${VERSION}.gz"
          gunzip -f "gost-linux-amd64-${VERSION}.gz"
          chmod +x "gost-linux-amd64-${VERSION}"
          mv "gost-linux-amd64-${VERSION}" gost

          ./gost -L=:1080 -F "$NODE_LINK" > /tmp/gost.log 2>&1 &
          sleep 2

          echo "ALL_PROXY=http://127.0.0.1:1080" >> $GITHUB_ENV
          echo "http_proxy=http://127.0.0.1:1080" >> $GITHUB_ENV
          echo "https_proxy=http://127.0.0.1:1080" >> $GITHUB_ENV
          echo "no_proxy=localhost,127.0.0.1" >> $GITHUB_ENV

          echo "✅ GOST 代理已启动: http://127.0.0.1:1080"
          
      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            google-chrome-stable \
            xvfb \
            x11-utils \
            xdotool \
            scrot
            
      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase
          seleniumbase install chromedriver
          
      - name: 🚀 运行脚本
        env:
          PYTHONIOENCODING: utf-8
          AXEN_ACCOUNT: ${{ secrets.US_ACCOUNT }}
          GOST_PROXY: http://127.0.0.1:1080   # ← 修复：与脚本中的 os.getenv('GOST_PROXY') 对应
          TG_BOT: ${{ secrets.TG_BOT }}
          CRON_JOB: ${{ secrets.US_CRON }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python axen_coins.py
          
      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          
      - name: 🧹 清理旧的工作流运行记录
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --repo ${{ github.repository }} --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 1 ]; then
              echo "删除运行记录: $run_id"
              gh run delete $run_id --repo ${{ github.repository }} || true
            fi
          done
