name: Axen-US

on:
  workflow_dispatch:
  repository_dispatch:
    types: [axen_auto_task]

jobs:
  run_axen_us:
    runs-on: ubuntu-latest
    env:
      PROXY_CONFIG_BASE64: ${{ secrets.PROXY_CONFIG_BASE64 }}   # 用于条件判断
    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本到工作目录
        run: mv private/axen_coins.py axen_coins.py

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # ===== Xray 代理启动（不导出环境变量）=====
      - name: 🔄 配置 Xray 代理（vless/vmess/ss）
        if: env.PROXY_CONFIG_BASE64 != ''
        run: |
          echo "📦 下载 Xray-core..."
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip
          chmod +x xray

          echo "$PROXY_CONFIG_BASE64" | base64 -d > config.json
          echo "✅ 配置文件已生成"

          nohup ./xray -c config.json > xray.log 2>&1 &
          sleep 3

          # 测试连通性（仅本步骤内有效）
          curl -s -x http://127.0.0.1:10809 https://api.ipify.org | sed 's/\([0-9]*\.[0-9]*\.\)[0-9]*\.[0-9]*/\1**.**/g'
          echo "✅ Xray 代理已就绪"
        # 注意：此处不写入 $GITHUB_ENV，避免影响其他步骤

      # ===== 系统依赖（直连）=====
      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            google-chrome-stable \
            xvfb \
            x11-utils \
            xdotool \
            scrot

      # ===== Python 依赖（直连，不再走代理）=====
      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase
          seleniumbase install chromedriver

      # ===== 运行脚本（在此处启用代理）=====
      - name: 🚀 运行脚本
        env:
          PYTHONIOENCODING: utf-8
          AXEN_ACCOUNT: ${{ secrets.US_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
          CRON_JOB: ${{ secrets.US_CRON }}
        run: |
          # 如果配置了代理，则在当前 shell 中启用
          if [ -n "$PROXY_CONFIG_BASE64" ]; then
            export HTTP_PROXY=http://127.0.0.1:10809
            export HTTPS_PROXY=http://127.0.0.1:10809
            export ALL_PROXY=socks5://127.0.0.1:1080
            echo "🔗 代理已启用"
          fi
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python axen_coins.py

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"

      - name: 🔔 通知
        if: always()
        env:
          WORKER_URL: ${{ secrets.CF_WORKER_URL }}
          WORKER_AUTH_TOKEN: ${{ secrets.CF_WORKER_AUTH_TOKEN }}
        run: |
          curl -X POST "$WORKER_URL" \
            -H "Authorization: Bearer $WORKER_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"status": "completed"}'
